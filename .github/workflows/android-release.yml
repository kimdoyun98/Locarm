name: Android Release Build

on:
  push:
    tags:
      - 'v*'   # v1.0.0 같은 태그에서만 실행

jobs:
  release:
    runs-on: ubuntu-latest

    environment:
       name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission
        run: chmod +x gradlew

      # 🔐 Keystore 복원
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      # 🔐 local.properties 생성 (서명 정보)
      - name: Create local.properties
        run: |
          echo "storeFile=keystore.jks" >> local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> local.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties
          echo "address_key=${{ secrets.KEY_ADDRESS }}" >> local.properties
          echo "Client_ID=${{ secrets.Client_ID }}" >> local.properties
          echo "Client_Secret=${{ secrets.Client_Secret }}" >> local.properties

      # CD
      - name: Build AAB
        run: ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: app/build/outputs/bundle/release/app-release.aab

      # 🔽 bundletool 다운로드
      - name: Download bundletool
        run: |
          wget https://github.com/google/bundletool/releases/download/1.15.6/bundletool-all-1.15.6.jar -O bundletool.jar

      # 🔽 AAB → APK 변환
      - name: Convert AAB to APK
        run: |
          java -jar bundletool.jar build-apks \
            --bundle=app/build/outputs/bundle/release/app-release.aab \
            --output=app.apks \
            --mode=universal \
            --ks=app/keystore.jks \
            --ks-key-alias=${{ secrets.KEY_ALIAS }} \
            --ks-pass=pass:${{ secrets.STORE_PASSWORD }} \
            --key-pass=pass:${{ secrets.KEY_PASSWORD }}

      # 🔽 APK 추출
      - name: Extract APK
        run: unzip app.apks -d apks

      # 🔽 APK 업로드
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: apks/universal.apk

      # 🔽 Play Store 배포
      - name: Deploy to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.kimdoyun.locarm
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
